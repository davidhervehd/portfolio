<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script type="text/javascript">
      // GitHub Pages SPA fallback for /portfolio project site.
      // Keeps one path segment for the repository name.
      // See: https://github.com/rafgraph/spa-github-pages
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;
        location.replace(
          location.protocol +
            '//' +
            location.hostname +
            (location.port ? ':' + location.port : '') +
            location.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            location.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (location.search
              ? '&' + location.search.slice(1).replace(/&/g, '~and~')
              : '') +
            location.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
